name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing stable tag to release
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate-release:
    runs-on: windows-2022
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Validate tag and synchronized versions
        shell: powershell
        run: npm run version:check -- --tag "$env:RELEASE_TAG"
      - name: Require an annotated tag on main
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tagRef = gh api "repos/${{ github.repository }}/git/ref/tags/$env:RELEASE_TAG" | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0 -or $tagRef.object.type -ne "tag") {
            throw "Release tags must be annotated tags."
          }
          $tagObject = gh api "repos/${{ github.repository }}/git/tags/$($tagRef.object.sha)" | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0 -or $tagObject.object.type -ne "commit") {
            throw "The annotated release tag must point to a commit."
          }
          git fetch origin main --no-tags
          $releaseCommit = $tagObject.object.sha
          git merge-base --is-ancestor $releaseCommit origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Release tag must point to a commit contained in origin/main."
          }
      - name: Reject an existing GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseTags = @(gh api --paginate "repos/${{ github.repository }}/releases?per_page=100" --jq '.[].tag_name')
          if ($LASTEXITCODE -ne 0) {
            throw "Unable to query existing GitHub Releases."
          }
          if ($releaseTags -contains $env:RELEASE_TAG) {
            throw "A GitHub Release already exists for $env:RELEASE_TAG."
          }

  validate-installer:
    needs: validate-release
    strategy:
      fail-fast: false
      matrix:
        runner: [windows-2022, windows-2025]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install Rust toolchain
        run: rustup show
      - name: Install dependencies
        run: npm ci
      - name: Build unsigned NSIS installer
        run: npm run tauri:build
      - name: Validate installer version
        shell: powershell
        run: |
          $version = $env:RELEASE_TAG.Substring(1)
          $installers = @(Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe)
          if ($installers.Count -ne 1) {
            throw "Expected exactly one NSIS installer, found $($installers.Count)."
          }
          if ($installers[0].Name -notmatch [regex]::Escape($version)) {
            throw "Installer name '$($installers[0].Name)' does not contain version $version."
          }
      - name: Smoke-test installation
        shell: powershell
        run: |
          $installer = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          ./scripts/smoke-install.ps1 -Installer $installer.FullName
      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.runner }}
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  publish:
    needs: validate-installer
    runs-on: windows-2022
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/download-artifact@v4
        with:
          name: installer-windows-2022
          path: release-assets
      - name: Create SHA-256 checksums
        shell: powershell
        run: |
          Get-ChildItem release-assets/*.exe | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          } | Out-File -Encoding ascii release-assets/SHA256SUMS.txt
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: release-assets/*
      - name: Publish GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$env:RELEASE_TAG" release-assets/* --title "Echo Player $env:RELEASE_TAG" --generate-notes --verify-tag
