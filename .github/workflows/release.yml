name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing stable tag to release
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate-release:
    runs-on: windows-2022
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Validate tag and synchronized versions
        shell: powershell
        run: npm run version:check -- --tag "$env:RELEASE_TAG"
      - name: Require an annotated tag on main
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tagRef = gh api "repos/${{ github.repository }}/git/ref/tags/$env:RELEASE_TAG" | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0 -or $tagRef.object.type -ne "tag") {
            throw "Release tags must be annotated tags."
          }
          $tagObject = gh api "repos/${{ github.repository }}/git/tags/$($tagRef.object.sha)" | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0 -or $tagObject.object.type -ne "commit") {
            throw "The annotated release tag must point to a commit."
          }
          git fetch origin main --no-tags
          $releaseCommit = $tagObject.object.sha
          git merge-base --is-ancestor $releaseCommit origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Release tag must point to a commit contained in origin/main."
          }
      - name: Reject an existing GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseTags = @(gh api --paginate "repos/${{ github.repository }}/releases?per_page=100" --jq '.[].tag_name')
          if ($LASTEXITCODE -ne 0) {
            throw "Unable to query existing GitHub Releases."
          }
          if ($releaseTags -contains $env:RELEASE_TAG) {
            throw "A GitHub Release already exists for $env:RELEASE_TAG."
          }

  build-windows:
    needs: validate-release
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Restore pinned FFmpeg
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: |
            src-tauri/.cache/ffmpeg
            src-tauri/resources
          key: ffmpeg-${{ runner.os }}-${{ hashFiles('scripts/ffmpeg-lock.json') }}
      - name: Restore Cargo downloads
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-download-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-download-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-
      - name: Install Rust toolchain
        run: rustup show
      - name: Install dependencies
        run: npm ci
      - name: Build unsigned NSIS installer
        run: npm run tauri:build
      - name: Validate installer version
        shell: powershell
        run: |
          $version = $env:RELEASE_TAG.Substring(1)
          $installers = @(Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe)
          if ($installers.Count -ne 1) {
            throw "Expected exactly one NSIS installer, found $($installers.Count)."
          }
          if ($installers[0].Name -notmatch [regex]::Escape($version)) {
            throw "Installer name '$($installers[0].Name)' does not contain version $version."
          }
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          overwrite: true

  build-macos:
    needs: validate-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: aarch64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 75
    env:
      CARGO_TERM_COLOR: always
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Restore pinned FFmpeg
        uses: actions/cache/restore@v4
        with:
          path: src-tauri/.cache/ffmpeg
          key: ffmpeg-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/ffmpeg-lock.json', 'scripts/prepare-ffmpeg.sh') }}
      - name: Restore Cargo downloads
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-download-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('src-tauri/Cargo.lock') }}
      - name: Install toolchains and dependencies
        run: |
          rustup show
          npm ci
      - name: Prepare pinned FFmpeg
        run: npm run ffmpeg:prepare
      - name: Build unsigned macOS DMG
        run: npm run tauri:build
      - name: Validate DMG and bundled FFmpeg
        run: |
          target="macos-${{ matrix.arch }}"
          node scripts/verify-ffmpeg-resource.mjs --directory src-tauri/resources --layout resource --target "$target"
          test "$(find src-tauri/target/release/bundle/dmg -name '*.dmg' | wc -l | tr -d ' ')" = "1"
      - uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ matrix.arch }}
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          overwrite: true

  smoke-test-windows:
    needs: build-windows
    strategy:
      fail-fast: false
      matrix:
        runner: [windows-2022, windows-2025]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-assets
      - name: Smoke-test installation
        shell: powershell
        run: |
          $installers = @(Get-ChildItem release-assets/*.exe)
          if ($installers.Count -ne 1) {
            throw "Expected exactly one downloaded NSIS installer, found $($installers.Count)."
          }
          ./scripts/smoke-install.ps1 -Installer $installers[0].FullName

  smoke-test-macos:
    needs: build-macos
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: aarch64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-macos-${{ matrix.arch }}
          path: release-assets
      - name: Smoke-test DMG contents
        run: |
          dmg="$(find release-assets -name '*.dmg' -print -quit)"
          test -n "$dmg"
          mount_point="$(mktemp -d)"
          hdiutil attach -nobrowse -readonly -mountpoint "$mount_point" "$dmg"
          trap 'hdiutil detach "$mount_point"' EXIT
          test -x "$mount_point/Sylloop.app/Contents/MacOS/sylloop"
          resource_dir="$mount_point/Sylloop.app/Contents/Resources/resources"
          test -x "$resource_dir/ffmpeg"
          metadata="$resource_dir/FFMPEG_BUILD_INFO.json"
          test -f "$metadata"
          grep -q '"profile": "core"' "$metadata"
          grep -q '"target": "macos-${{ matrix.arch }}"' "$metadata"
          for license in FFmpeg-COPYING.LGPLv2.1 FFmpeg-COPYING.LGPLv3 FFmpeg-LICENSE.md; do
            test -f "$resource_dir/FFMPEG_LICENSES/$license"
          done
          version="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["ffmpegVersion"])' "$metadata")"
          "$resource_dir/ffmpeg" -version | head -n 1 | grep "ffmpeg version $version"
          "$mount_point/Sylloop.app/Contents/MacOS/sylloop" &
          app_pid=$!
          sleep 5
          kill -0 "$app_pid"
          kill "$app_pid"

  publish:
    needs: [smoke-test-windows, smoke-test-macos]
    runs-on: windows-2022
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-assets
      - uses: actions/download-artifact@v4
        with:
          name: release-macos-aarch64
          path: release-assets/macos-aarch64
      - uses: actions/download-artifact@v4
        with:
          name: release-macos-x86_64
          path: release-assets/macos-x86_64
      - name: Normalize release asset filename
        shell: powershell
        run: |
          $installers = @(Get-ChildItem release-assets/*.exe)
          if ($installers.Count -ne 1) {
            throw "Expected exactly one installer to publish, found $($installers.Count)."
          }
          $version = $env:RELEASE_TAG.Substring(1)
          $releaseName = "Sylloop_${version}_x64-setup.exe"
          if ($installers[0].Name -ne $releaseName) {
            Rename-Item -LiteralPath $installers[0].FullName -NewName $releaseName
          }
          $macArm = @(Get-ChildItem release-assets/macos-aarch64/*.dmg)
          $macIntel = @(Get-ChildItem release-assets/macos-x86_64/*.dmg)
          if ($macArm.Count -ne 1 -or $macIntel.Count -ne 1) {
            throw "Expected one DMG for each macOS architecture."
          }
          Move-Item -LiteralPath $macArm[0].FullName -Destination "release-assets/Sylloop_${version}_aarch64.dmg"
          Move-Item -LiteralPath $macIntel[0].FullName -Destination "release-assets/Sylloop_${version}_x64.dmg"
          Remove-Item -LiteralPath release-assets/macos-aarch64,release-assets/macos-x86_64 -Force
      - name: Create SHA-256 checksums
        shell: powershell
        run: |
          Get-ChildItem release-assets -File | Where-Object { $_.Extension -in '.exe', '.dmg' } | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          } | Out-File -Encoding ascii release-assets/SHA256SUMS.txt
      - name: Generate release manifest
        shell: powershell
        run: |
          $sourceCommit = (git rev-list -n 1 $env:RELEASE_TAG).Trim()
          $publishedAt = [DateTimeOffset]::UtcNow.ToString("o")
          $version = $env:RELEASE_TAG.Substring(1)
          npm run release:manifest -- `
            --windows "release-assets/Sylloop_${version}_x64-setup.exe" `
            --macos-aarch64 "release-assets/Sylloop_${version}_aarch64.dmg" `
            --macos-x86-64 "release-assets/Sylloop_${version}_x64.dmg" `
            --tag "$env:RELEASE_TAG" `
            --source-commit "$sourceCommit" `
            --published-at "$publishedAt" `
            --output "release-assets/sylloop-release-v1.json"
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: release-assets/*
      - name: Publish GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$env:RELEASE_TAG" release-assets/* --title "Sylloop $env:RELEASE_TAG" --generate-notes --verify-tag
