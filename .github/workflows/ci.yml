name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      kind: ${{ steps.change-kind.outputs.kind }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Classify the change
        id: change-kind
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            kind=$(node scripts/classify-ci-change.mjs --base "$BASE_SHA" --head "$HEAD_SHA" --head-ref "$HEAD_REF")
          else
            kind=full
          fi
          echo "kind=$kind" >> "$GITHUB_OUTPUT"
      - name: Validate release metadata
        if: steps.change-kind.outputs.kind == 'release-only'
        run: npm run version:check

  windows-test:
    needs: classify
    if: needs.classify.outputs.kind == 'full'
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Restore pinned FFmpeg
        id: ffmpeg-cache
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: |
            src-tauri/.cache/ffmpeg
            src-tauri/resources
          key: ffmpeg-${{ runner.os }}-${{ hashFiles('scripts/ffmpeg-lock.json') }}
      - name: Restore Cargo downloads
        id: cargo-download-cache
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-download-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-download-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-
      - name: Restore E2E build dependencies
        id: e2e-build-cache
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: |
            .e2e-target/debug/.fingerprint
            .e2e-target/debug/build
            .e2e-target/debug/deps
          # Tauri build outputs contain absolute checkout paths, so repository renames must invalidate this cache.
          key: e2e-build-${{ runner.os }}-${{ github.event.repository.name }}-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            e2e-build-${{ runner.os }}-${{ github.event.repository.name }}-${{ hashFiles('rust-toolchain.toml') }}-
      - name: Install Rust toolchain
        run: rustup show
      - name: Install JavaScript dependencies
        run: npm ci
      - name: Validate application version
        run: npm run version:check
      - name: Prepare pinned FFmpeg
        run: npm run ffmpeg:prepare
      - name: Audit JavaScript dependencies
        run: npm audit --audit-level=high
      - name: Test and build frontend
        run: |
          npm test
          npm run build
      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check
      - name: Lint and test Rust backend
        working-directory: src-tauri
        run: |
          cargo clippy --all-targets --locked -- -D warnings
          cargo test --locked
      - name: Audit Rust dependencies
        working-directory: src-tauri
        run: |
          cargo install cargo-audit --locked
          cargo audit
      - name: Build E2E application
        run: npm run build:e2e
      - name: Run native Windows E2E tests
        run: npm run test:e2e:tauri
      - name: Save pinned FFmpeg
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && steps.ffmpeg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            src-tauri/.cache/ffmpeg
            src-tauri/resources
          key: ${{ steps.ffmpeg-cache.outputs.cache-primary-key }}
      - name: Save Cargo downloads
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && steps.cargo-download-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ steps.cargo-download-cache.outputs.cache-primary-key }}
      - name: Save E2E build dependencies
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && steps.e2e-build-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            .e2e-target/debug/.fingerprint
            .e2e-target/debug/build
            .e2e-target/debug/deps
          key: ${{ steps.e2e-build-cache.outputs.cache-primary-key }}
      - name: Upload E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          path: |
            e2e-results/
            logs/
          if-no-files-found: ignore
          retention-days: 7

  macos-test:
    needs: classify
    if: needs.classify.outputs.kind == 'full'
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-15, macos-15-intel]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 75
    env:
      CARGO_TERM_COLOR: always
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Restore pinned FFmpeg
        id: macos-ffmpeg-cache
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: src-tauri/.cache/ffmpeg
          key: ffmpeg-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/ffmpeg-lock.json', 'scripts/prepare-ffmpeg.sh') }}
      - name: Restore Cargo downloads
        id: macos-cargo-download-cache
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-download-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('src-tauri/Cargo.lock') }}
      - name: Install toolchains and dependencies
        run: |
          rustup show
          npm ci
      - name: Validate application version
        run: npm run version:check
      - name: Prepare pinned FFmpeg
        run: npm run ffmpeg:prepare
      - name: Test frontend
        run: npm test
      - name: Check Rust backend
        working-directory: src-tauri
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --locked -- -D warnings
          cargo test --locked
      - name: Build macOS DMG
        run: npm run tauri:build
      - name: Verify bundled FFmpeg and DMG
        run: |
          test -x src-tauri/resources/ffmpeg
          src-tauri/resources/ffmpeg -version | head -n 1 | grep 'ffmpeg version 8.1.2'
          test "$(find src-tauri/target/release/bundle/dmg -name '*.dmg' | wc -l | tr -d ' ')" = "1"
      - name: Save pinned FFmpeg
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && steps.macos-ffmpeg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: src-tauri/.cache/ffmpeg
          key: ${{ steps.macos-ffmpeg-cache.outputs.cache-primary-key }}
      - name: Save Cargo downloads
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && steps.macos-cargo-download-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ steps.macos-cargo-download-cache.outputs.cache-primary-key }}

  gate:
    needs: [classify, windows-test, macos-test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require the applicable validation
        shell: bash
        env:
          CLASSIFY_RESULT: ${{ needs.classify.result }}
          CHANGE_KIND: ${{ needs.classify.outputs.kind }}
          WINDOWS_RESULT: ${{ needs.windows-test.result }}
          MACOS_RESULT: ${{ needs.macos-test.result }}
        run: |
          if [[ "$CLASSIFY_RESULT" != "success" ]]; then
            echo "Change classification or release metadata validation failed."
            exit 1
          fi
          case "$CHANGE_KIND" in
            full)
              [[ "$WINDOWS_RESULT" == "success" ]] || exit 1
              [[ "$MACOS_RESULT" == "success" ]] || exit 1
              ;;
            release-only)
              [[ "$WINDOWS_RESULT" == "skipped" ]] || exit 1
              [[ "$MACOS_RESULT" == "skipped" ]] || exit 1
              ;;
            *)
              echo "Unknown change kind: $CHANGE_KIND"
              exit 1
              ;;
          esac
